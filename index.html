<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>런드리고 효도지원금 신청</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="bg-deco" aria-hidden="true">
      <div class="bg-circle bg-circle--a"></div>
      <div class="bg-circle bg-circle--b"></div>
    </div>

    <article class="popup-card" role="dialog" aria-labelledby="popup-title" aria-modal="true">

      <button type="button" class="close-btn" aria-label="팝업 닫기">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14 4L4 14M4 4l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- 로고 -->
      <div class="brand-mark">
        <img src="logo.png" alt="LaundryGo" class="brand-logo" />
      </div>

      <!-- 헤더 -->
      <header class="popup-header">
        <span class="event-badge">이벤트 참여 신청</span>
        <h1 id="popup-title" class="popup-title">런드리고 효도지원금<br />신청하기</h1>
        <p class="popup-desc">아래 정보를 입력하시면 이벤트 참여가 완료됩니다.</p>
      </header>

      <div class="divider" aria-hidden="true"></div>

      <!-- 폼 -->
      <form id="event-form" class="event-form" novalidate>

        <div class="field-group">
          <label class="field-label" for="participantName">
            신청자 이름 <span class="req" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="participantName"
            name="participantName"
            class="field-input"
            placeholder="이름을 입력해주세요"
            autocomplete="name"
          />
          <p class="field-error" id="err-participantName" role="alert"></p>
        </div>

        <div class="field-group">
          <label class="field-label" for="participantPhone">
            신청자 휴대폰 번호 <span class="req" aria-hidden="true">*</span>
          </label>
          <input
            type="tel"
            id="participantPhone"
            name="participantPhone"
            class="field-input"
            placeholder="010-0000-0000"
            maxlength="13"
            autocomplete="tel"
          />
          <p class="field-error" id="err-participantPhone" role="alert"></p>
        </div>

        <div class="field-group">
          <div class="label-row">
            <label class="field-label" for="parentCustomerInfo">
              신청자 부모님 고객 정보 <span class="req" aria-hidden="true">*</span>
            </label>
            <button type="button" class="helper-btn" id="helper-toggle" aria-expanded="false" aria-controls="info-helper">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 6.5v4M7 4h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              확인 방법
            </button>
          </div>

          <div id="info-helper" class="info-helper" hidden aria-live="polite">
            <p class="info-helper-title">고객 정보 확인 방법</p>
            <ol class="info-steps">
              <li>LAUNDRYGO 앱 → <strong>MY 탭</strong> 이동</li>
              <li><strong>회원정보</strong> 선택</li>
              <li><strong>고객지원 정보</strong> → <strong>복사</strong> 버튼 탭</li>
              <li>아래 입력란에 <strong>붙여넣기</strong></li>
            </ol>
          </div>

          <textarea
            id="parentCustomerInfo"
            name="parentCustomerInfo"
            class="field-input field-textarea"
            
            placeholder="MY탭 › 회원정보 › 고객지원 정보 복사 후 붙여넣기"
          ></textarea>
          <p class="field-error" id="err-parentCustomerInfo" role="alert"></p>
        </div>

        <div class="field-group">
          <label class="checkbox-label">
            <input type="checkbox" name="privacyAgree" id="privacyAgree" class="sr-only" />
            <span class="checkbox-box" aria-hidden="true">
              <svg width="11" height="8" viewBox="0 0 11 8" fill="none" aria-hidden="true">
                <path d="M1 4l3 3 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="checkbox-text">
              <strong>개인정보 수집 및 이용에 동의합니다.</strong>
              <span class="checkbox-sub">수집된 정보는 이벤트 참여 확인 및 경품 발송 목적에만 사용됩니다.</span>
            </span>
          </label>
          <p class="field-error" id="err-privacyAgree" role="alert"></p>
        </div>

        <p class="form-global-error" id="form-global-error" role="alert" hidden></p>

        <button type="submit" class="submit-btn" id="submit-btn">신청하기</button>

      </form>

    </article>
  </div>

  <script src="script.js"></script>
</body>
</html>
